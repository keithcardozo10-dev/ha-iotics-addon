name: Iotics Smart Home Bridge
version: "1.0.0"
slug: iotics_smart_home_bridge
description: Connect your Iotics smart home devices to Home Assistant. Just enter your email and password — auto-discovers all switches, lights, fans, and sensors.
url: https://github.com/keithcardozo10-dev/ha-iotics-addon
arch:
  - aarch64
  - amd64
init: false
startup: application
boot: auto
hassio_api: true
hassio_role: default
homeassistant_api: true
auth_api: true
ports: {}
ports_description: {}
host_network: true
apparmor: false
privileged:
  - NET_ADMIN
options:
  iotics_email: ""
  iotics_password: ""
schema:
  iotics_email: str
  iotics_password: str
